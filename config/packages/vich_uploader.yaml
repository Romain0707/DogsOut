vich_uploader:
    db_driver: orm
    mappings:
        images:
            uri_prefix: /uploads/images
            upload_destination: '%kernel.project_dir%/public/uploads/images'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            delete_on_update: true
        balade_images:
            uri_prefix: /uploads/balades
            upload_destination: '%kernel.project_dir%/public/uploads/balades'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
        chien_image:
            uri_prefix: /uploads/chiens
            upload_destination: '%kernel.project_dir%/public/uploads/chiens'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer